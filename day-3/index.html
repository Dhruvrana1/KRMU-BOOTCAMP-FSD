<style>
*{
    margin: 0px;

    display: flex;
    justify-content: center;

    flex-direction: column;
}

<body>
    <div class="head">
    <h1>
        WELCOME TO KR MANGALAM
    </h1>

    <BUTTOn> Change</BUTTOn>
    </div>
    <script>const heading = document.querySelector("h1");
const button = document.querySelector("button");

let changed = false;

button.addEventListener("click", () => {
    if (!changed) {
        heading.innerText = "WELCOME TO BOOTCAMP";
        heading.style.backgroundColor = "red";
        heading.style.color = "white";
        changed = true;
    } else {
        heading.innerText = "WELCOME TO KR MANGALAM";
        heading.style.backgroundColor = "";
        heading.style.color = "";
        changed = false;
    }
});
</script>
</body>
